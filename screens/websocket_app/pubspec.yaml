name: websocket_app
description: "Screens for SCOUT"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  web_socket_channel: ^3.0.3

  flutter_riverpod: ^2.5.1

  go_router: ^14.2.1

  flutter_screenutil: ^5.9.3

  google_fonts: ^6.2.1

  comm_module:
    git:
      url: https://github.com/karthikeya-tummala-nrt/comm_module

  mavlink_nrt:
    git:
      url: https://github.com/karthikeya-tummala-nrt/mavlink_module


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.json
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
